# H2 in-memory database (PostgreSQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:roadrunner_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.jwt.secret=dGVzdFNlY3JldEtleUZvclJvYWRSdW5uZXJUZXN0aW5nMTIz
app.jwt.expiration-ms=3600000

# reCAPTCHA (disabled for tests)
app.recaptcha.enabled=false
app.recaptcha.secret-key=test-dummy-secret-key
